layout: {zmk_keyboard: go60}
layers:
  Base:
  - ['=', '1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '-']
  - ['&caps_word', Q, W, E, R, T, Y, U, I, O, P, \]
  - - ESC
    - {t: A, h: LCTRL}
    - {t: S, h: LALT}
    - {t: D, h: LGUI}
    - {t: F, h: LSHFT}
    - G
    - H
    - {t: J, h: RSHFT}
    - {t: K, h: RGUI}
    - {t: L, h: RALT}
    - {t: ;, h: RCTRL}
    - ''''
  - - {t: '&rgb_ug_status_macro', h: Magic}
    - Z
    - X
    - C
    - V
    - B
    - N
    - M
    - ','
    - .
    - /
    - '&keypad_td'
  - ['`', DEL, BSPC, LGUI, '[', ']', RET, TAB, LCTRL, LALT, BSPC, SPACE]
  Keypad:
  - ['', F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11]
  - - {t: ▽, type: trans}
    - ''
    - HOME
    - UP
    - END
    - PG UP
    - KP 7
    - KP 8
    - KP 9
    - KP MINUS
    - KP SLASH
    - F12
  - - {t: ▽, type: trans}
    - Ctl+Y
    - LEFT
    - DOWN
    - RIGHT
    - PG DN
    - KP 4
    - KP 5
    - KP 6
    - KP PLUS
    - KP MULTIPLY
    - KP NUM
  - - {t: '&rgb_ug_status_macro', h: Magic}
    - Ctl+Z
    - Ctl+X
    - Ctl+C
    - Ctl+V
    - Sft+Ctl+V
    - KP 1
    - KP 2
    - KP 3
    - KP ENTER
    - '='
    - {t: Base, h: toggle}
  - - ''
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - KP 0
    - KP DOT
    - BSPC
    - SymbolNav
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - KP 0
  SymbolNav:
  - [INS, F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11]
  - [SLCK, '!', HOME, UP, END, PG UP, (, ), UP, '%', APP, F12]
  - [CAPS, '@', LEFT, DOWN, RIGHT, PG DN, $, LEFT, DOWN, RIGHT, PAUSE BREAK, PSCRN]
  - - {t: '&rgb_ug_status_macro', h: Magic}
    - '#'
    - '['
    - ']'
    - '{'
    - '}'
    - '&'
    - '*'
    - _
    - +
    - LSHFT
    - LCTRL
  - - ^
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - Ctl+Sft+TAB
    - Ctl+TAB
    - {t: Base, h: toggle, type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  Magic:
  - [BT CLR, BRI DN, BRI UP, PREV, NEXT, PP, MUTE, VOL DN, VOL UP, '', '', BT CLR ALL]
  - ['&bootloader', RGB SPI, RGB SAI, RGB HUI, RGB BRI, RGB TOG, PP, PREV, NEXT, '', '', '&bootloader']
  - ['&sys_reset', RGB SPD, RGB SAD, RGB HUD, RGB BRD, RGB EFF, '', '', '', '', '', '&sys_reset']
  - - {type: held}
    - ''
    - '&bt_0'
    - '&bt_1'
    - '&bt_2'
    - '&bt_3'
    - ''
    - ''
    - ''
    - ''
    - ''
    - {t: Factory, h: toggle}
  - [OUT USB, '', '', '', '', '', '', '', '', '', '', '']
  Factory:
  - ['0', '4', '8', '3', '8', '3', '3', '8', '3', '8', '4', '0']
  - ['1', '5', '9', '4', '9', '4', '4', '9', '4', '9', '5', '1']
  - ['2', '6', '0', '5', '0', '5', '5', '0', '5', '0', '6', '2']
  - ['3', '7', '1', '6', '1', '6', '6', '1', '6', '1', '7', '3']
  - ['2', '7', '2', '2', '7', '2', '7', '8', '9', '9', '8', '7']
