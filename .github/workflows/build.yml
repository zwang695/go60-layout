name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/checkout@v4
        with:
          repository: moergo-sc/zmk
          ref: main
          path: src
      - name: Apply ZMK tri-state behavior patch
        run: scripts/apply-tri-state-patch.sh src
      - name: Apply ZMK layer locking patch
        run: scripts/apply-layer-locking-patch.sh src
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-22.05
      - uses: cachix/cachix-action@v14
        with:
          name: moergo-glove80-zmk-dev
          skipPush: true
      - name: Build Go60 combined firmware
        run: |
          set -o pipefail
          if ! nix-build config -o combined --show-trace 2>&1 | tee build.log; then
            {
              echo 'Build failed. Last 200 log lines:'
              tail -n 200 build.log
            } > build-tail.log
            python3 -c 'from pathlib import Path; message = Path("build-tail.log").read_text(errors="replace")[-6000:]; message = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"); print(f"::error file=.github/workflows/build.yml,line=22,title=Nix build failed::{message}")'
            exit 1
          fi
      - name: Copy result out of nix store
        run: cp combined/go60.uf2 go60.uf2
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: go60.uf2
          path: go60.uf2
